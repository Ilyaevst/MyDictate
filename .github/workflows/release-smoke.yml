name: release smoke

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  install:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build and verify the release source
        run: |
          ./scripts/build-app.sh "$RUNNER_TEMP/MyDictate.app"
          test -x "$RUNNER_TEMP/MyDictate.app/Contents/MacOS/MyDictate"
          test "$(plutil -extract CFBundleIdentifier raw -o - "$RUNNER_TEMP/MyDictate.app/Contents/Info.plist")" = "com.local.mydictate"
          file "$RUNNER_TEMP/MyDictate.app/Contents/MacOS/MyDictate" | grep -q arm64
          codesign --verify --deep --strict "$RUNNER_TEMP/MyDictate.app"
          codesign -d --entitlements :- "$RUNNER_TEMP/MyDictate.app" > "$RUNNER_TEMP/entitlements.plist" 2>/dev/null
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.security.device.audio-input' "$RUNNER_TEMP/entitlements.plist")" = "true"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.security.device.microphone' "$RUNNER_TEMP/entitlements.plist")" = "true"
