name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate scripts and plists
        run: ./scripts/check.sh
      - name: Swift self-tests
        run: swift run -c debug --package-path swift Parakey --self-test all
      - name: Build app bundle
        run: ./scripts/build-app.sh "$RUNNER_TEMP/MyDictate.app"
      - name: Verify app bundle
        run: |
          test -x "$RUNNER_TEMP/MyDictate.app/Contents/MacOS/MyDictate"
          codesign --verify --deep --strict "$RUNNER_TEMP/MyDictate.app"
      - name: Exercise installer and uninstaller
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/MyDictate.app" "$RUNNER_TEMP/release/MyDictate.zip"
          MYDICTATE_APP_PATH="$RUNNER_TEMP/Applications/MyDictate.app" \
          MYDICTATE_NO_OPEN=1 \
            ./install.sh
          test -x "$RUNNER_TEMP/Applications/MyDictate.app/Contents/MacOS/MyDictate"
          codesign --verify --deep --strict "$RUNNER_TEMP/Applications/MyDictate.app"
          MYDICTATE_APP_PATH="$RUNNER_TEMP/Applications/MyDictate.app" ./uninstall.sh
          test ! -e "$RUNNER_TEMP/Applications/MyDictate.app"
